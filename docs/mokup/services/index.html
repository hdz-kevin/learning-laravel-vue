<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Servicios</title>

    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Phosphor Icons: Minimalist, clean icon set matching the mockup -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS CDN Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0D6EFD",
              "primary-hover": "#0b5ed7",
              "bg-body": "#ffffff",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-body text-gray-800 antialiased h-screen overflow-hidden flex">
    <!-- Sidebar -->
    <aside
      class="w-[260px] flex flex-col shrink-0 border-r border-gray-200"
    >
      <div class="px-4 py-6">
        <h2 class="font-bold text-2xl text-gray-800 tracking-tight">
          Pelisas
        </h2>
      </div>

      <nav class="flex flex-col">
        <a
          href="/mokup/appointments/"
          class="flex items-center gap-2.5 px-4 py-2.5 text-gray-800 font-semibold border-b border-gray-100 transition-all"
        >
          <i class="ph ph-calendar-blank text-lg font-medium text-gray-800"></i>
          <span class="text-[15px]">Citas</span>
        </a>
        <a
          href="/mokup/patients/"
          class="flex items-center gap-2.5 px-4 py-2.5 text-gray-800 font-semibold border-b border-gray-100 transition-all"
        >
          <i class="ph ph-user text-lg font-medium text-gray-800"></i>
          <span class="text-[15px]">Pacientes</span>
        </a>

        <a
          href="/mokup/services/"
          class="flex items-center gap-2.5 px-4 py-2.5 bg-indigo-100 text-indigo-900 font-semibold border-b border-gray-100 transition-all"
        >
          <i class="ph ph-list text-lg font-medium text-indigo-900"></i>
          <span class="text-[15px]">Servicios</span>
        </a>
      </nav>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 bg-bg-body flex flex-col overflow-y-auto">
      <!-- Header -->
      <header class="bg-white px-10 py-6 border-b border-gray-200 shrink-0 shadow">
        <h1 class="text-2xl font-bold text-gray-800">Servicios</h1>
      </header>

      <!-- Content Area -->
      <div class="px-10 py-10 flex-1 flex flex-col">
        <div class="flex justify-end mb-8">
          <a href="./create.html" class="bg-indigo-800 text-white px-5 py-3 rounded-2xl text-[15px] font-medium transition-all hover:bg-indigo-700">
            <span class="text-xl mr-1">+</span>
            Nuevo Servicio
          </a>
        </div>

        <!-- Responsive Table Wrapper -->
        <div class="w-full overflow-x-auto border border-gray-200 rounded-md shadow shadow-sm py-3">
          <table class="w-full text-left">
            <thead class="shadow">
              <tr>
                <th class="py-4 px-6 text-gray-900 font-semibold text-[15px] uppercase border-b border-gray-100">
                  Nombre
                </th>
                <th class="py-4 px-6 text-gray-900 font-semibold text-[15px] uppercase border-b border-gray-100">
                  Precio
                </th>
                <th class="py-4 px-6 text-gray-900 font-semibold text-[15px] uppercase border-b border-gray-100 text-right">
                  Acciones
                </th>
              </tr>
            </thead>
            <tbody>
              <!-- Item 1 -->
              <tr class="fade-in-row group transition-colors">
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="font-semibold text-lg text-gray-800">Quiropodia</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="text-green-700 bg-green-50 px-3.5 py-1.5 rounded-xl font-medium border border-green-200">$500.00</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100 text-right">
                  <div class="flex justify-end gap-2 text-gray-400">
                    <button
                      title="Editar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-gray-100 text-indigo-800 transition-all"
                    >
                      <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button
                      title="Eliminar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-red-50 text-red-600 transition-all"
                    >
                      <i class="ph ph-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>

              <!-- Item 2 -->
              <tr class="fade-in-row group transition-colors">
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="font-semibold text-lg text-gray-800">Tratamiento de Hongos</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="text-green-700 bg-green-50 px-3.5 py-1.5 rounded-xl font-medium border border-green-200">$800.00</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100 text-right">
                  <div class="flex justify-end gap-2 text-gray-400">
                    <button
                      title="Editar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-gray-100 text-indigo-800 transition-all"
                    >
                      <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button
                      title="Eliminar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-red-50 text-red-600 transition-all"
                    >
                      <i class="ph ph-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>

              <!-- Item 3 -->
              <tr class="fade-in-row group transition-colors">
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="font-semibold text-lg text-gray-800">Extracción de Uña Encarnada</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="text-green-700 bg-green-50 px-3.5 py-1.5 rounded-xl font-medium border border-green-200">$1,200.00</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100 text-right">
                  <div class="flex justify-end gap-2 text-gray-400">
                    <button
                      title="Editar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-gray-100 text-indigo-800 transition-all"
                    >
                      <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button
                      title="Eliminar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-red-50 text-red-600 transition-all"
                    >
                      <i class="ph ph-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>

              <!-- Item 4 -->
              <tr class="fade-in-row group transition-colors">
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="font-semibold text-lg text-gray-800">Estudio Biomecánico</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100">
                  <span class="text-green-700 bg-green-50 px-3.5 py-1.5 rounded-xl font-medium border border-green-200">$1,500.00</span>
                </td>
                <td class="py-4 px-6 border-b border-gray-100 text-right">
                  <div class="flex justify-end gap-2 text-gray-400">
                    <button
                      title="Editar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-gray-100 text-indigo-800 transition-all"
                    >
                      <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button
                      title="Eliminar"
                      class="w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-red-50 text-red-600 transition-all"
                    >
                      <i class="ph ph-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </body>
</html>
