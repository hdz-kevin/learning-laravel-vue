<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Pelisas.</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS CDN Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D6EFD',
                        'primary-hover': '#0b5ed7',
                        'bg-body': '#F5F7FA',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom entry animation -->
    <style>
        .fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-bg-body text-gray-900 antialiased h-screen flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-xl flex flex-col items-center gap-7 fade-in-up">
        
        <div class="text-center w-full">
            <h1 class="font-bold text-[42px] text-gray-900 tracking-tight">Login</h1>
        </div>

        <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-100 w-full mb-8">
            <form action="index.html" class="flex flex-col gap-6">
                <!-- Email -->
                <div class="flex flex-col gap-2.5">
                    <label for="email" class="text-lg font-semibold text-gray-800">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@correo.com" required
                        class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-full text-[16px] focus:bg-white focus:outline-none focus:ring-[3px] focus:ring-primary/10 focus:border-primary transition-all text-gray-900 placeholder-gray-400">
                </div>

                <!-- Password -->
                <div class="flex flex-col gap-2.5">
                    <label for="password" class="text-lg font-semibold text-gray-800 mt-2">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-full text-[16px] focus:bg-white focus:outline-none focus:ring-[3px] focus:ring-primary/10 focus:border-primary transition-all text-gray-900 placeholder-gray-400">
                </div>

                <!-- Login Btn -->
                <button
                    type="submit" 
                    class="w-full mt-4 bg-gray-800 hover:bg-gray-700 text-white py-4 px-4 rounded-full font-semibold text-[17px] transition-all flex items-center justify-center gap-2"
                >
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
</body>
</html>
